<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>人体结构学 · 复习</title>
<style>
  :root{
    --bg:#0f1420; --panel:#171e2e; --panel2:#1e2739; --line:#2b3854;
    --txt:#e7ecf6; --mut:#93a0bd; --accent:#4db6ff; --good:#37d39b; --bad:#ff6b7a;
    --dot:#ffd23f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
       display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);
         display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;white-space:nowrap}
  header .sub{color:var(--mut);font-size:12px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  .tab{padding:6px 12px;border-radius:8px;background:var(--panel2);color:var(--mut);
       border:1px solid transparent;cursor:pointer;font-size:14px;user-select:none}
  .tab:hover{color:var(--txt)}
  .tab.active{background:var(--accent);color:#04121f;font-weight:700}

  .modebar{padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--line);
           display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .viewbar{padding:7px 16px;background:#121928;border-bottom:1px solid var(--line);
           display:flex;gap:7px;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .viewbar:empty{display:none}
  .viewbtn{border:1px solid var(--line);background:var(--panel2);color:var(--mut);
           padding:5px 11px;border-radius:999px;cursor:pointer;font-size:13px;
           white-space:nowrap;flex:0 0 auto}
  .viewbtn:hover{color:var(--txt);border-color:var(--accent)}
  .viewbtn.on{background:var(--accent);border-color:var(--accent);color:#04121f;font-weight:700}
  .viewbtn:disabled{opacity:.5;cursor:not-allowed}
  .seg{display:inline-flex;background:var(--panel2);border-radius:9px;padding:3px}
  .seg button{border:0;background:transparent;color:var(--mut);padding:6px 14px;border-radius:7px;
              cursor:pointer;font-size:14px}
  .seg button.on{background:var(--accent);color:#04121f;font-weight:700}
  .modebar .hint{color:var(--mut);font-size:12px;margin-left:4px}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:6px 12px;
       border-radius:8px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:var(--accent)}
  .btn.mini{padding:4px 9px;font-size:12px}
  .spacer{flex:1}
  .score{font-size:13px;color:var(--mut)}
  .score b{color:var(--good)}

  main{flex:1;display:flex;min-height:0}
  .stagewrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;min-width:0;overflow:auto}
  .stage{--dot-size:20px;--dot-font-size:11px;--dot-border:2px;--dot-ring:2px;--learn-dot-size:15px;
         position:relative;max-width:100%;max-height:100%;background:#000;border-radius:10px;
         overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .imgspace{position:absolute;inset:0}
  .imgspace img{position:absolute;left:0;top:0;width:100%;height:100%;user-select:none;-webkit-user-drag:none}

  .dot{--dot-scale:1;position:absolute;width:var(--dot-size);height:var(--dot-size);border-radius:50%;
       background:var(--dot);border:var(--dot-border) solid #1a1200;cursor:pointer;touch-action:none;
       box-shadow:0 0 0 var(--dot-ring) rgba(255,210,63,.35);transition:transform .1s;z-index:5;
       transform:translate(-50%,-50%) scale(var(--dot-scale));transform-origin:center}
  .dot:hover{--dot-scale:1.25}
  .dot .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
            font-size:var(--dot-font-size);font-weight:700;color:#241a00}
  .dot.answered{background:var(--good);box-shadow:0 0 0 var(--dot-ring) rgba(55,211,155,.35)}
  .dot.answered.ghost{opacity:.24;pointer-events:none;filter:saturate(.7);--dot-scale:.88}
  .dot.answered.ghost .num{opacity:.75}
  .dot.wrong{background:var(--bad)}
  .dot.sel{--dot-scale:1.35;z-index:7}

  .tip{position:absolute;transform:translate(-50%,-140%);background:#000d;backdrop-filter:blur(4px);
       color:#fff;padding:4px 9px;border-radius:7px;font-size:14px;white-space:nowrap;z-index:9;
       border:1px solid var(--line);pointer-events:none}
  .learn .dot{width:var(--learn-dot-size);height:var(--learn-dot-size)}
  .learn .dot .num{display:none}

  /* right side panel */
  aside{width:270px;background:var(--panel);border-left:1px solid var(--line);
        display:flex;flex-direction:column;min-height:0}
  aside h3{margin:0;padding:12px 14px;font-size:14px;border-bottom:1px solid var(--line);color:var(--mut)}
  .list{overflow:auto;flex:1;padding:6px}
  .li{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;gap:8px;align-items:center}
  .li:hover{background:var(--panel2)}
  .li .b{width:20px;height:20px;border-radius:50%;background:var(--panel2);color:var(--mut);
         display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
  .li .meta{margin-left:auto;color:var(--mut);font-size:12px}
  .li.done .b{background:var(--good);color:#04121f}
  .li.done{color:var(--mut);text-decoration:line-through}
  .li.chosen{background:var(--accent);color:#04121f;font-weight:700}
  .li.chosen .meta{color:#04121f}
  .asidebtns{padding:10px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}

  /* quiz prompt bar (test mode) */
  .quizbar{display:none;padding:10px 16px;background:var(--panel2);border-bottom:1px solid var(--line);
           align-items:center;gap:12px;font-size:15px}
  .quizbar.show{display:flex}
  .quizbar .q{font-size:16px}
  .quizbar .q b{color:var(--dot);font-size:19px}

  /* gallery */
  .gallery{display:none;flex:1;overflow:auto;padding:16px;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .gallery.show{display:grid}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:zoom-in}
  .card img{width:100%;display:block;background:#000}
  .card .cap{padding:8px 10px;font-size:13px;color:var(--mut)}
  .lightbox{display:none;position:fixed;inset:0;background:#000e;z-index:50;align-items:center;justify-content:center;padding:20px}
  .lightbox.show{display:flex}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px}
  .lightbox .x{position:absolute;top:16px;right:20px;font-size:30px;color:#fff;cursor:pointer}

  .editnote{display:none;position:absolute;left:10px;top:10px;background:#000c;padding:6px 10px;border-radius:8px;
            font-size:12px;color:var(--dot);z-index:10;max-width:60%}
  .edit .editnote{display:block}

  @media (max-width:760px){
    body{height:auto;min-height:100dvh;overflow:auto;-webkit-text-size-adjust:100%}
    header{padding:7px 10px 6px;gap:6px}
    header h1{font-size:14px}
    header .sub{display:none}
    .tabs{margin-left:0;width:100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 2px;gap:5px}
    .tab{flex:0 0 auto;padding:6px 11px;font-size:13px;border-radius:10px}
    .modebar{padding:7px 10px;gap:6px;align-items:flex-start}
    .modebar .hint{display:none}
    .seg{width:100%;display:flex}
    .seg button{flex:1;padding:7px 8px;font-size:13px}
    .btn{padding:6px 10px;font-size:12px}
    .btn.mini{padding:5px 8px;font-size:12px}
    .score{font-size:12px}
    .viewbar{padding:6px 10px;gap:6px}
    .viewbtn{padding:5px 10px;font-size:12px}
    .quizbar{padding:8px 10px;gap:8px;flex-wrap:wrap}
    .quizbar .q{font-size:14px;flex:1 1 100%}
    .quizbar .q b{font-size:17px}
    main{flex-direction:column;flex:none}
    .stagewrap{height:auto;flex:none;padding:10px 10px 6px;overflow:visible;align-items:flex-start}
    .stage{border-radius:12px}
    aside{width:100%;border-left:none;border-top:1px solid var(--line)}
    aside h3{padding:10px 12px}
    .list{flex:none;max-height:28vh}
    .li{padding:10px 10px}
    .asidebtns{padding:10px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .asidebtns .btn{width:100%;padding:7px 0}
    .stage{--dot-size:18px;--dot-font-size:10px;--dot-border:1.5px;--dot-ring:1.5px;--learn-dot-size:13px}
    .gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:12px}
    .lightbox{padding:10px}
    .lightbox .x{top:8px;right:14px}
  }
</style>
</head>
<body>
<header>
  <h1>人体结构学 · 复习</h1>
  <span class="sub">点圆点显示结构名称</span>
  <div class="tabs" id="tabs"></div>
</header>

<div class="modebar" id="modebar">
  <div class="seg" id="modeseg">
    <button data-mode="learn">学习模式</button>
    <button data-mode="test" class="on">测试模式</button>
    <button data-mode="edit">编辑模式</button>
  </div>
  <span class="hint" id="modehint"></span>
  <span class="spacer"></span>
  <span class="score" id="score"></span>
  <button class="btn mini" id="resetTest">重置进度</button>
</div>

<div class="viewbar" id="viewbar"></div>

<div class="quizbar" id="quizbar">
  <span class="q">找出：<b id="quizname">—</b></span>
  <button class="btn mini" id="quizSkip">跳过/不会</button>
  <button class="btn mini" id="quizRestart">重新开始</button>
  <span class="score" id="quizprog"></span>
</div>

<main>
  <div class="stagewrap" id="stagewrap">
    <div class="stage" id="stage">
      <div class="imgspace" id="imgspace">
        <img id="mainimg" alt="">
      </div>
      <div class="editnote">编辑模式：单击空白处新增圆点；拖动圆点调位置；点圆点可改名/删除。改完记得“导出数据”。</div>
    </div>
  </div>
  <div class="gallery" id="gallery"></div>

  <aside id="aside">
    <h3 id="asideTitle">结构清单</h3>
    <div class="list" id="list"></div>
    <div class="asidebtns">
      <button class="btn mini" id="revealAll">显示全部</button>
      <button class="btn mini" id="hideAll">隐藏全部</button>
      <button class="btn mini" id="exportBtn">导出数据</button>
    </div>
  </aside>
</main>

<div class="lightbox" id="lightbox"><span class="x" id="lbx">×</span><img id="lbimg" alt=""></div>

<script src="data.js?v=20260706b"></script>
<script>
const DATA = window.ANATOMY_DATA;
const LS_EDITS = "anatomy_edits_v11";
const LS_DONE  = "anatomy_done_v11";
const LS_MISTAKES = "anatomy_mistakes_v11";
const LS_OLD_EDITS = "anatomy_edits_v1";
const LS_OLD_DONE  = "anatomy_done_v1";

function safeJson(raw,fallback){
  try{ return raw ? JSON.parse(raw) : fallback; }catch(_){ return fallback; }
}
function normalizeData(){
  DATA.regions.forEach(region=>{
    if(!Array.isArray(region.views)){
      region.views=[{
        id: region.id+"-main",
        label: region.name,
        image: region.image,
        w: region.w,
        h: region.h,
        crop: region.crop,
        masks: region.masks,
        points: region.points || []
      }];
    }
    region.views.forEach((view,idx)=>{
      view.id = view.id || `${region.id}-${idx+1}`;
      view.label = view.label || `${region.name} ${idx+1}`;
      view.crop = view.crop || {x:0,y:0,w:100,h:100};
      view.points = Array.isArray(view.points) ? view.points : [];
    });
  });
}
normalizeData();

function viewKey(region=curRegion,view=curView){ return `${region.id}:${view.id}`; }

let edits = safeJson(localStorage.getItem(LS_EDITS), {});
let done = safeJson(localStorage.getItem(LS_DONE), {});
let mistakes = safeJson(localStorage.getItem(LS_MISTAKES), {});
const oldEdits = safeJson(localStorage.getItem(LS_OLD_EDITS), {});
const oldDone = safeJson(localStorage.getItem(LS_OLD_DONE), {});

DATA.regions.forEach(region=>{
  const first=region.views[0];
  const k=`${region.id}:${first.id}`;
  if(oldEdits[region.id] && !edits[k]) edits[k]=oldEdits[region.id];
  if(oldDone[region.id] && !done[k]) done[k]=oldDone[region.id];
  region.views.forEach(view=>{
    const vk=`${region.id}:${view.id}`;
    if(edits[vk]) view.points=edits[vk];
  });
});
localStorage.setItem(LS_EDITS,JSON.stringify(edits));
localStorage.setItem(LS_DONE,JSON.stringify(done));
localStorage.setItem(LS_MISTAKES,JSON.stringify(mistakes));

let curRegion = DATA.regions[0];
let curView = curRegion.views[0];
let mode = "test";
let quiz = null; // {order:[idx...], pos, correct, total}
let learnSession = null; // {regionId, signature, targets:[{key,name,steps:[...]}], targetPos, stepPos}

function activeMeta(){
  const editing = mode === "edit" && curView.editImage;
  const practice = mode !== "edit" && curView.practiceImage;
  return {
    image: editing ? curView.editImage : (practice ? curView.practiceImage : curView.image),
    w: editing ? (curView.editW || curView.w) : (practice ? (curView.practiceW || curView.w) : curView.w),
    h: editing ? (curView.editH || curView.h) : (practice ? (curView.practiceH || curView.h) : curView.h),
    crop: editing ? (curView.editCrop || curView.crop || {x:0,y:0,w:100,h:100}) : (practice ? (curView.practiceCrop || curView.crop || {x:0,y:0,w:100,h:100}) : (curView.crop || {x:0,y:0,w:100,h:100})),
    masks: editing ? (curView.editMasks || curView.masks) : (practice ? curView.practiceMasks : curView.masks),
    points: practice ? (curView.practicePoints || curView.points || []) : (curView.points || [])
  };
}
function activePoints(){ return activeMeta().points; }
function currentMistakes(){ return mistakes[viewKey()] || {}; }
function mistakeCount(idx){ return currentMistakes()[idx] || 0; }
function labelWithMistakes(name, idx){
  const count = mistakeCount(idx);
  return count>0 ? `${name}（错${count}次）` : name;
}
function viewPoints(view, usePractice=true){
  const practice = usePractice && view.practiceImage;
  return practice ? (view.practicePoints || view.points || []) : (view.points || []);
}
function isFullbodyView(view=curView){
  return !!view && (String(view.id||"").startsWith("fullbody-") || String(view.label||"").includes("全身"));
}
function normalizeLearnName(name=""){
  return String(name || "").replace(/[（(].*?[）)]/g,"").trim();
}
function buildLearnTargets(region=curRegion){
  const groups = [];
  const map = new Map();
  region.views.forEach(view=>{
    viewPoints(view, true).forEach((point, pointIdx)=>{
      const key = point.learnKey || normalizeLearnName(point.name);
      if(!key) return;
      if(!map.has(key)){
        const target = {key, name:key, steps:[]};
        map.set(key, target);
        groups.push(target);
      }
      map.get(key).steps.push({
        viewId:view.id,
        viewLabel:view.label,
        pointIdx,
        fullName:point.name
      });
    });
  });
  return groups;
}
function learnSignature(targets){
  return targets.map(target=>`${target.key}:${target.steps.map(step=>`${step.viewId}#${step.pointIdx}`).join(",")}`).join("|");
}
function currentLearnTarget(){
  return learnSession ? learnSession.targets[learnSession.targetPos] : null;
}
function currentLearnStep(){
  const target = currentLearnTarget();
  return target ? target.steps[learnSession.stepPos] : null;
}
function syncLearnView(){
  if(mode !== "learn") return;
  const step = currentLearnStep();
  if(!step) return;
  const targetView = curRegion.views.find(view=>view.id === step.viewId);
  if(targetView) curView = targetView;
}
function ensureLearnSession(force=false){
  const targets = buildLearnTargets(curRegion);
  const signature = learnSignature(targets);
  if(force || !learnSession || learnSession.regionId !== curRegion.id || learnSession.signature !== signature){
    learnSession = {
      regionId: curRegion.id,
      signature,
      targets,
      targetPos: 0,
      stepPos: 0
    };
  } else {
    learnSession.targets = targets;
    learnSession.signature = signature;
    if(learnSession.targetPos > targets.length) learnSession.targetPos = targets.length;
    const target = targets[learnSession.targetPos];
    if(!target) learnSession.stepPos = 0;
    else if(learnSession.stepPos >= target.steps.length) learnSession.stepPos = Math.max(0, target.steps.length - 1);
  }
  syncLearnView();
}
function advanceLearn(){
  if(!learnSession) return;
  const target = currentLearnTarget();
  if(!target) return;
  if(learnSession.stepPos < target.steps.length - 1){
    learnSession.stepPos++;
  } else {
    learnSession.targetPos++;
    learnSession.stepPos = 0;
  }
  syncLearnView();
}
function revealLearnAnswer(){
  const step = currentLearnStep();
  if(!step) return;
  const dot = imgspace.querySelector(`.dot[data-idx="${step.pointIdx}"]`);
  if(!dot) return;
  const point = activePoints()[step.pointIdx];
  if(!point) return;
  dot.classList.add("sel");
  showTip(dot, point.name, parseFloat(dot.style.left), parseFloat(dot.style.top));
  setTimeout(()=>{
    dot.classList.remove("sel");
    clearTip();
  }, 1400);
}

const $ = s=>document.querySelector(s);
const stage=$("#stage"), imgspace=$("#imgspace"), img=$("#mainimg");
const listEl=$("#list"), scoreEl=$("#score"), quizbar=$("#quizbar");
const viewbar=$("#viewbar");

// ---------- tabs ----------
const tabs=$("#tabs");
DATA.regions.forEach(r=>{
  const b=document.createElement("div"); b.className="tab"; b.textContent=r.name;
  b.onclick=()=>{ selectRegion(r); setTab(b); showBody(); };
  tabs.appendChild(b);
});
const galTab=document.createElement("div"); galTab.className="tab"; galTab.textContent="全部参考图";
galTab.onclick=()=>{ setTab(galTab); showGallery(); };
tabs.appendChild(galTab);
function setTab(el){ [...tabs.children].forEach(c=>c.classList.remove("active")); el.classList.add("active"); }
setTab(tabs.children[0]);

function showGallery(){
  $("#gallery").classList.add("show");
  $("#stagewrap").style.display="none";
  $("#aside").style.display="none";
  $("#modebar").style.display="none";
  viewbar.style.display="none";
  quizbar.classList.remove("show");
}
function showBody(){
  $("#gallery").classList.remove("show");
  $("#stagewrap").style.display="flex";
  $("#aside").style.display="flex";
  $("#modebar").style.display="flex";
  viewbar.style.display="flex";
  renderViewbar();
  render();
}

// ---------- mode ----------
document.querySelectorAll("#modeseg button").forEach(b=>{
  b.onclick=()=>{ mode=b.dataset.mode;
    document.querySelectorAll("#modeseg button").forEach(x=>x.classList.toggle("on",x===b));
    render();
  };
});
const HINTS={learn:"按提示依次找结构，同一点位会在不同图片中连续出现。",test:"按提示找结构，或直接点圆点作答。",edit:"编辑圆点位置与名称。"};

function selectRegion(r){
  curRegion=r;
  curView=r.views[0];
  quiz=null;
  learnSession=null;
}
function selectView(view){
  curView=view;
  quiz=null;
  renderViewbar();
  render();
}
function renderViewbar(){
  viewbar.innerHTML="";
  const learnStep = mode === "learn" ? currentLearnStep() : null;
  curRegion.views.forEach(view=>{
    const b=document.createElement("button");
    b.className="viewbtn"+(view===curView?" on":"");
    b.type="button";
    b.textContent=view.label;
    if(mode === "learn" && learnStep){
      b.disabled = true;
      b.title = "学习模式会按当前点位自动切换图片";
    } else {
      b.onclick=()=>selectView(view);
    }
    viewbar.appendChild(b);
  });
}

// ---------- render ----------
function render(){
  if(mode==="learn") ensureLearnSession();
  $("#modehint").textContent=HINTS[mode];
  renderViewbar();
  stage.className="stage "+mode;
  const testing = (mode==="test");
  const fullbody = isFullbodyView();
  const meta = activeMeta();
  const points = meta.points;
  const rd = done[viewKey()]||{};
  // geometry
  const c = testing ? meta.crop : {x:0,y:0,w:100,h:100};
  const pxW = meta.w*(c.w/100), pxH = meta.h*(c.h/100);
  const ar = pxW/pxH;
  // fit stage into wrap
  const wrap=$("#stagewrap");
  const mobile = window.innerWidth<=760;
  const availW = wrap.clientWidth-(mobile?20:28), availH = wrap.clientHeight-28;
  let sw=availW, sh=sw/ar;
  if(mobile){
    const headerH = document.querySelector("header")?.offsetHeight || 0;
    const modebarH = $("#modebar").offsetParent ? $("#modebar").offsetHeight : 0;
    const viewbarH = viewbar.offsetParent ? viewbar.offsetHeight : 0;
    const quizbarH = mode==="test" && points.length ? Math.max(quizbar.offsetHeight, 54) : 0;
    const reservedH = headerH + modebarH + viewbarH + quizbarH + 92;
    const mobileMaxH = Math.max(220, Math.min(window.innerHeight*(fullbody ? 0.68 : 0.52), window.innerHeight-reservedH));
    if(sh>mobileMaxH){ sh=mobileMaxH; sw=sh*ar; }
  } else if(sh>availH){
    sh=availH; sw=sh*ar;
  } // desktop: also fit height
  if(fullbody){
    const zoom = mobile ? 1.12 : 1.16;
    sw *= zoom;
    sh *= zoom;
  }
  stage.style.width=sw+"px"; stage.style.height=sh+"px";
  const pointDensity = points.length / Math.max((sw*sh)/10000,1);
  let dotSize = mobile ? 18 : 20;
  if(mobile){
    const densityPenalty = Math.min(3.5, Math.max(0, pointDensity-1.6));
    dotSize = Math.max(14, Math.min(18, sw/19 - densityPenalty));
  }
  const learnDotFloor = mobile ? 10 : 12;
  const learnDotSize = Math.max(learnDotFloor, dotSize-(mobile ? 4 : 5));
  const dotFontSize = Math.max(9, Math.round(dotSize*0.5));
  const dotBorder = mobile ? 1.5 : 2;
  const dotRing = mobile ? 1.5 : 2;
  stage.style.setProperty("--dot-size", `${dotSize}px`);
  stage.style.setProperty("--learn-dot-size", `${learnDotSize}px`);
  stage.style.setProperty("--dot-font-size", `${dotFontSize}px`);
  stage.style.setProperty("--dot-border", `${dotBorder}px`);
  stage.style.setProperty("--dot-ring", `${dotRing}px`);
  // image fills crop
  img.src=meta.image;
  img.alt=`${curRegion.name} · ${curView.label}`;
  img.style.width=(100/(c.w/100))+"%";
  img.style.height=(100/(c.h/100))+"%";
  img.style.left=(-(c.x)/(c.w))*100+"%";
  img.style.top=(-(c.y)/(c.h))*100+"%";

  // masks (cover leftover printed text in test mode)
  [...imgspace.querySelectorAll(".mask")].forEach(e=>e.remove());
  if(testing && meta.masks){
    meta.masks.forEach(m=>{
      const mx=(m.x-c.x)/c.w*100, my=(m.y-c.y)/c.h*100, mw=m.w/c.w*100, mh=m.h/c.h*100;
      const el=document.createElement("div"); el.className="mask";
      el.style.cssText=`position:absolute;left:${mx}%;top:${my}%;width:${mw}%;height:${mh}%;background:${m.c||'#ffffff'};z-index:3`;
      imgspace.appendChild(el);
    });
  }

  // dots
  [...imgspace.querySelectorAll(".dot,.tip")].forEach(e=>e.remove());
  points.forEach((p,idx)=>{
    // map to view coords
    const vx=(p.x-c.x)/c.w*100, vy=(p.y-c.y)/c.h*100;
    if(testing && (vx<0||vx>100||vy<0||vy>100)) return; // outside crop
    const d=document.createElement("div"); d.className="dot"; d.style.left=vx+"%"; d.style.top=vy+"%";
    d.dataset.idx=idx;
    if(mode!=="learn"){ const n=document.createElement("span"); n.className="num"; n.textContent=idx+1; d.appendChild(n); }
    if(mode==="test" && rd[idx]){
      d.classList.add("answered");
      d.classList.add("ghost");
    }
    imgspace.appendChild(d);

    if(mode==="learn"){
      d.addEventListener("click",()=>learnClick(idx,d,vx,vy,p.name));
    } else if(mode==="test"){
      d.addEventListener("click",()=>testClick(idx,d,vx,vy,p.name));
    } else { // edit
      enableDrag(d,idx,c);
    }
  });
  if(mode==="edit") setupEditAdd(c);
  else stage.onclick=null;

  buildList();
  updateScore();
  syncActionButtons();
  if(mode==="test" && points.length) startQuizIfNeeded();
  else if(mode==="learn" && learnSession && learnSession.targets.length) startLearnIfNeeded();
  else {
    quizbar.classList.remove("show");
    if(mode!=="learn") quiz=null;
  }
}

function showTip(d,txt,vx,vy){ clearTip(); const t=document.createElement("div"); t.className="tip"; t.textContent=txt; t.style.left=vx+"%"; t.style.top=vy+"%"; imgspace.appendChild(t); }
function clearTip(){ const t=imgspace.querySelector(".tip"); if(t)t.remove(); }

// ---------- learn ----------
function startLearnIfNeeded(){
  quizbar.classList.add("show");
  paintLearn();
}
function paintLearn(){
  if(!learnSession) return;
  if(!learnSession.targets.length){
    $("#quizname").textContent="本区暂无学习点";
    $("#quizprog").textContent="";
    return;
  }
  if(learnSession.targetPos>=learnSession.targets.length){
    $("#quizname").textContent="✓ 本区已学完";
    $("#quizprog").textContent=`完成 ${learnSession.targets.length}/${learnSession.targets.length}`;
    return;
  }
  const target = currentLearnTarget();
  const step = currentLearnStep();
  $("#quizname").textContent=target.name;
  $("#quizprog").textContent=`点位 ${learnSession.targetPos+1}/${learnSession.targets.length} · 图片 ${learnSession.stepPos+1}/${target.steps.length} · ${step.viewLabel}`;
}
function learnClick(idx,d,vx,vy,name){
  const step = currentLearnStep();
  if(!step || step.viewId !== curView.id) return;
  showTip(d,name,vx,vy);
  setTimeout(clearTip,1100);
  if(idx===step.pointIdx){
    d.classList.add("answered");
    setTimeout(()=>{
      advanceLearn();
      render();
    }, 320);
  } else {
    d.classList.add("wrong");
    setTimeout(()=>d.classList.remove("wrong"),600);
  }
}

// ---------- test / quiz ----------
function startQuizIfNeeded(){
  if(!quiz){ newQuiz(); }
  quizbar.classList.add("show");
  paintQuiz();
}
function newQuiz(){
  const rd=done[viewKey()]||{};
  const order=activePoints().map((_,i)=>i).filter(i=>!rd[i]);
  // shuffle
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  quiz={order,pos:0,correct:0,total:order.length,answered:{}};
}
function curQuizIdx(){ return quiz? quiz.order[quiz.pos] : -1; }
function paintQuiz(){
  if(!quiz) return;
  if(quiz.total===0){ $("#quizname").textContent="✓ 本图已全部掌握"; $("#quizprog").textContent="无需再测"; return; }
  if(quiz.pos>=quiz.order.length){ $("#quizname").textContent="✓ 全部完成！"; $("#quizprog").textContent=`得分 ${quiz.correct}/${quiz.total}`; return; }
  $("#quizname").textContent=activePoints()[curQuizIdx()].name;
  $("#quizprog").textContent=`${quiz.pos+1}/${quiz.order.length} · 已答对 ${quiz.correct}`;
}
function testClick(idx,d,vx,vy,name){
  // always reveal name
  showTip(d,name,vx,vy); setTimeout(clearTip,1400);
  if(done[viewKey()]?.[idx]) return;
  if(!quiz||quiz.pos>=quiz.order.length) { markDone(idx); return; }
  const target=curQuizIdx();
  if(idx===target){
    d.classList.add("answered","ghost"); quiz.correct++; markDone(idx);
    quiz.pos++; paintQuiz();
  } else {
    addMistake(target);
    d.classList.add("wrong"); setTimeout(()=>d.classList.remove("wrong"),600);
  }
}
function markDone(idx){ const k=viewKey(); done[k]=done[k]||{}; done[k][idx]=true; localStorage.setItem(LS_DONE,JSON.stringify(done)); updateScore(); buildList(); }
function addMistake(idx){
  if(idx<0) return;
  const k=viewKey();
  mistakes[k]=mistakes[k]||{};
  mistakes[k][idx]=(mistakes[k][idx]||0)+1;
  localStorage.setItem(LS_MISTAKES,JSON.stringify(mistakes));
  buildList();
}
function syncActionButtons(){
  $("#quizSkip").textContent = mode==="learn" ? "显示答案" : "跳过/不会";
  $("#quizRestart").textContent = mode==="learn" ? "重学本区" : "重新开始";
  $("#revealAll").textContent = mode==="learn" ? "显示答案" : "显示全部";
  $("#hideAll").textContent = mode==="learn" ? "重学本区" : "隐藏全部";
}
$("#quizSkip").onclick=()=>{
  if(mode==="learn"){ revealLearnAnswer(); return; }
  if(quiz&&quiz.pos<quiz.order.length){ quiz.pos++; paintQuiz(); }
};
$("#quizRestart").onclick=()=>{
  if(mode==="learn"){ ensureLearnSession(true); render(); return; }
  newQuiz(); paintQuiz(); render();
};
$("#resetTest").onclick=()=>{
  if(mode==="learn"){
    if(confirm("从本区第一个点位重新开始？")){ ensureLearnSession(true); render(); }
    return;
  }
  if(confirm("清空本图测试进度与错题统计？")){
    done[viewKey()]={};
    mistakes[viewKey()]={};
    localStorage.setItem(LS_DONE,JSON.stringify(done));
    localStorage.setItem(LS_MISTAKES,JSON.stringify(mistakes));
    quiz=null;
    render();
  }
};

function updateScore(){
  if(mode==="learn"){
    const total = learnSession ? learnSession.targets.length : 0;
    const doneCount = learnSession ? Math.min(learnSession.targetPos, total) : 0;
    scoreEl.innerHTML=`本区进度 <b>${doneCount}</b> / ${total}`;
    return;
  }
  const rd=done[viewKey()]||{}; const n=Object.keys(rd).length; const tot=activePoints().length;
  scoreEl.innerHTML=`本图掌握 <b>${n}</b> / ${tot}`;
}

// ---------- list ----------
function buildList(){
  if(mode==="learn"){
    buildLearnList();
    return;
  }
  const points = activePoints();
  $("#asideTitle").textContent=`结构清单 · ${curRegion.name} · ${curView.label} (${points.length})`;
  listEl.innerHTML="";
  const rd=done[viewKey()]||{};
  const currentIdx = mode==="test" && quiz && quiz.pos<quiz.order.length ? curQuizIdx() : -1;
  if(!points.length){
    const empty=document.createElement("div");
    empty.className="li";
    empty.style.cursor="default";
    empty.innerHTML=`<span class="b">—</span><span class="nm">本图暂无测试点，可在编辑模式手动添加。</span>`;
    listEl.appendChild(empty);
    return;
  }
  const order = points.map((_,idx)=>idx).sort((a,b)=>{
    const pa = rd[a] ? 1 : 0;
    const pb = rd[b] ? 1 : 0;
    if(pa!==pb) return pa-pb;
    return a-b;
  });
  order.forEach(idx=>{
    const p=points[idx];
    const li=document.createElement("div");
    li.dataset.idx=idx;
    li.className="li"+(rd[idx]?" done":"")+(idx===currentIdx?" chosen":"");
    li.innerHTML=`<span class="b">${idx+1}</span><span class="nm">${rd[idx]?labelWithMistakes(p.name,idx):labelWithMistakes('？',idx)}</span>`;
    li.onclick=()=>{ // flash the dot
      const dot=imgspace.querySelector(`.dot[data-idx="${idx}"]`);
      if(dot){ dot.classList.add("sel"); setTimeout(()=>dot.classList.remove("sel"),700);
        const nm=li.querySelector(".nm"); nm.textContent=labelWithMistakes(p.name,idx); }
    };
    listEl.appendChild(li);
  });
}
function buildLearnList(){
  const targets = learnSession ? learnSession.targets : [];
  $("#asideTitle").textContent=`学习顺序 · ${curRegion.name} (${targets.length})`;
  listEl.innerHTML="";
  if(!targets.length){
    const empty=document.createElement("div");
    empty.className="li";
    empty.style.cursor="default";
    empty.innerHTML=`<span class="b">—</span><span class="nm">本区暂无学习点，可在编辑模式手动添加。</span>`;
    listEl.appendChild(empty);
    return;
  }
  targets.forEach((target,idx)=>{
    const li=document.createElement("div");
    const doneTarget = learnSession && idx < learnSession.targetPos;
    const currentTarget = learnSession && idx === learnSession.targetPos && learnSession.targetPos < targets.length;
    const stepDone = currentTarget ? learnSession.stepPos : (doneTarget ? target.steps.length : 0);
    li.className = "li" + (doneTarget ? " done" : "") + (currentTarget ? " chosen" : "");
    li.innerHTML=`<span class="b">${idx+1}</span><span class="nm">${target.name}</span><span class="meta">${stepDone}/${target.steps.length}</span>`;
    li.onclick=()=>{ if(currentTarget) revealLearnAnswer(); };
    listEl.appendChild(li);
  });
}
$("#revealAll").onclick=()=>{
  if(mode==="learn"){ revealLearnAnswer(); return; }
  const points=activePoints();
  [...listEl.querySelectorAll(".li")].forEach(li=>{
    const idx=Number(li.dataset.idx);
    const nm=li.querySelector(".nm");
    if(points[idx] && nm) nm.textContent=labelWithMistakes(points[idx].name,idx);
  });
};
$("#hideAll").onclick=()=>{
  if(mode==="learn"){ ensureLearnSession(true); render(); return; }
  const rd=done[viewKey()]||{}; const points=activePoints();
  [...listEl.querySelectorAll(".li")].forEach(li=>{
    const idx=Number(li.dataset.idx);
    const nm=li.querySelector(".nm");
    if(points[idx] && !rd[idx] && nm) nm.textContent=labelWithMistakes('？',idx);
  });
};

// ---------- edit mode ----------
function enableDrag(d,idx,c){
  d.style.cursor="grab";
  let dragging=false,moved=false,sx=0,sy=0;
  d.addEventListener("pointerdown",e=>{
    e.stopPropagation();
    dragging=true; moved=false; sx=e.clientX; sy=e.clientY;
    try{ d.setPointerCapture(e.pointerId); }catch(_){}
    d.style.cursor="grabbing";
  });
  d.addEventListener("pointermove",e=>{
    if(!dragging)return;
    if(Math.abs(e.clientX-sx)>4||Math.abs(e.clientY-sy)>4) moved=true;
    const r=imgspace.getBoundingClientRect();
    let vx=(e.clientX-r.left)/r.width*100, vy=(e.clientY-r.top)/r.height*100;
    // view->orig
    const ox=c.x+vx/100*c.w, oy=c.y+vy/100*c.h;
    curView.points[idx].x=Math.max(0,Math.min(100,+ox.toFixed(2)));
    curView.points[idx].y=Math.max(0,Math.min(100,+oy.toFixed(2)));
    d.style.left=vx+"%"; d.style.top=vy+"%";
  });
  d.addEventListener("pointerup",()=>{ if(dragging){ dragging=false; d.style.cursor="grab"; if(moved) saveEdits(); } });
  d.addEventListener("click",e=>{ e.stopPropagation(); if(moved)return; editPoint(idx); });
}
function editPoint(idx){
  const p=curView.points[idx];
  const nn=prompt("结构名称（留空=删除该点）：",p.name);
  if(nn===null)return;
  if(nn.trim()===""){ curView.points.splice(idx,1); } else { p.name=nn.trim(); }
  saveEdits(); render();
}
function setupEditAdd(c){
  stage.onclick=e=>{
    if(e.target.classList.contains("dot"))return;
    const r=imgspace.getBoundingClientRect();
    let vx=(e.clientX-r.left)/r.width*100, vy=(e.clientY-r.top)/r.height*100;
    if(vx<0||vx>100||vy<0||vy>100)return;
    const ox=c.x+vx/100*c.w, oy=c.y+vy/100*c.h;
    const nn=prompt("新结构名称：","");
    if(nn&&nn.trim()){ curView.points.push({x:+ox.toFixed(2),y:+oy.toFixed(2),name:nn.trim()}); saveEdits(); render(); }
  };
}
function saveEdits(){
  edits[viewKey()]=curView.points;
  localStorage.setItem(LS_EDITS,JSON.stringify(edits));
  learnSession=null;
}

// ---------- export ----------
$("#exportBtn").onclick=()=>{
  const regions=DATA.regions.map(r=>({
    id:r.id,
    name:r.name,
    views:r.views.map(v=>({
      id:v.id,
      label:v.label,
      image:v.image,
      w:v.w,
      h:v.h,
      editImage:v.editImage,
      editW:v.editW,
      editH:v.editH,
      editCrop:v.editCrop,
      editMasks:v.editMasks,
      practiceImage:v.practiceImage,
      practiceW:v.practiceW,
      practiceH:v.practiceH,
      practiceCrop:v.practiceCrop,
      practiceMasks:v.practiceMasks,
      practicePoints:v.practicePoints,
      crop:v.crop,
      masks:v.masks,
      points:v.points
    }))
  }));
  const out="window.ANATOMY_DATA = "+JSON.stringify({regions,gallery:DATA.gallery},null,2)+";";
  const blob=new Blob([out],{type:"text/javascript"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="data.js"; a.click();
  alert("已下载 data.js。用它替换项目里的 data.js 即可永久保存你的修改。");
};

// ---------- gallery ----------
const gal=$("#gallery");
DATA.gallery.forEach(g=>{
  const c=document.createElement("div"); c.className="card";
  c.innerHTML=`<img loading="lazy" src="${g.file}"><div class="cap">${g.title}</div>`;
  c.onclick=()=>{ $("#lbimg").src=g.file; $("#lightbox").classList.add("show"); };
  gal.appendChild(c);
});
$("#lbx").onclick=()=>$("#lightbox").classList.remove("show");
$("#lightbox").onclick=e=>{ if(e.target.id==="lightbox") $("#lightbox").classList.remove("show"); };

// init  (URL params for quick preview: ?region=foot&mode=learn)
const qp=new URLSearchParams(location.search);
if(qp.get("region")){ const r=DATA.regions.find(x=>x.id===qp.get("region")); if(r){ curRegion=r; curView=r.views[0]; const ti=DATA.regions.indexOf(r); setTab(tabs.children[ti]); } }
if(qp.get("view")){ const v=curRegion.views.find(x=>x.id===qp.get("view")); if(v) curView=v; }
if(qp.get("mode")){ mode=qp.get("mode"); document.querySelectorAll("#modeseg button").forEach(x=>x.classList.toggle("on",x.dataset.mode===mode)); }
const rerender=()=>{ if($("#gallery").classList.contains("show"))return; render(); };
window.addEventListener("resize",rerender);
if(window.visualViewport){ window.visualViewport.addEventListener("resize",rerender); }
img.onload=()=>{ /* keep sizing correct after load */ };
renderViewbar();
render();
</script>
</body>
